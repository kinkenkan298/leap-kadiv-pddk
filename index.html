<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Leap Surabaya</title>

    <!-- Google Fonts (Nunito) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- AdminLTE 4 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-rc2/dist/css/adminlte.min.css"
    />

    <style>
      body {
        background-color: #f2f7ff;
        font-family: "Nunito", sans-serif;
      }

      #auth {
        height: 100vh;
        overflow-x: hidden;
      }

      #auth-left {
        padding: 5rem 3rem;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: rgba(255, 255, 255, 1);
      }

      .auth-logo {
        margin-bottom: 2rem;
      }

      .auth-logo img {
        width: 5rem;
        height: 5rem;
      }

      .auth-title {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        color: #25396f;
        font-weight: 700;
      }

      .auth-subtitle {
        color: #a8aebb;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      .form-group {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .form-control-xl {
        padding: 1.3rem 5rem 1.3rem 2.8rem;
        font-size: 1rem;
        border-radius: 0.5rem;
        background-color: #f2f7ff;
        border: 1px solid #dce7f1;
        transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
      }

      .form-control-xl:focus {
        background-color: #fff;
        border-color: #435ebe;
        box-shadow: 0 0 0 0.25rem rgba(67, 94, 190, 0.25);
      }

      /* Error state pada input */
      .form-control-xl.is-invalid {
        border-color: #dc3545 !important;
        background-color: #fff8f8;
        box-shadow: none !important;
      }

      .form-control-xl.is-invalid:focus {
        box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.2) !important;
      }

      .form-control-icon {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 1rem;
        color: #a8aebb;
        font-size: 1.2rem;
        transition: color 0.3s;
        pointer-events: none;
        z-index: 5;
      }

      .has-icon-left:focus-within .form-control-icon {
        color: #435ebe;
      }

      /* Icon ikut merah saat field error */
      .has-icon-left.has-error .form-control-icon {
        color: #dc3545;
      }

      /* Pesan error di bawah input */
      .field-error {
        display: none;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.84rem;
        color: #dc3545;
        margin-top: 0.45rem;
        padding-left: 0.2rem;
        animation: fadeInDown 0.2s ease;
      }

      .field-error.show {
        display: flex;
      }

      .field-error i {
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Tombol toggle show/hide password */
      .password-toggle {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        right: 1rem;
        background: none;
        border: none;
        color: #a8aebb;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 0.25rem 0.4rem;
        z-index: 5;
        transition: color 0.3s;
        line-height: 1;
      }

      .password-toggle:hover,
      .password-toggle:focus {
        color: #435ebe;
        outline: none;
      }

      .font-bold {
        font-weight: 700;
        text-decoration: none;
        color: #435ebe;
      }

      #auth-right {
        height: 100%;
        background-image: url("./img/background.png");
        background-size: cover;
        background-position: center;
        position: relative;
      }

      #auth-right::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(67, 94, 190, 0.6);
      }

      @media (max-width: 991.98px) {
        #auth-left { padding: 3rem; }
      }

      @media (max-width: 575.98px) {
        #auth-left { padding: 2rem; }
        .auth-title { font-size: 2rem; }
      }
    </style>
  </head>

  <body>
    <div id="auth">
      <div class="row h-100 g-0">

        <!-- Kolom Kiri: Form Login -->
        <div class="col-lg-5 col-12">
          <div id="auth-left">

            <div class="auth-logo">
              <a href="index.html">
                <img src="./img/leap.png" alt="Logo" />
              </a>
            </div>

            <h1 class="auth-title">Log in.</h1>
            <p class="auth-subtitle mb-5">
              Gunakan Username dan Password Anda untuk masuk
            </p>

            <form id="loginForm" novalidate>

              <!-- Input Username -->
              <div class="form-group position-relative has-icon-left mb-4" id="wrapUsername">
                <input
                  type="text"
                  id="inputUsername"
                  class="form-control form-control-xl"
                  placeholder="Username"
                  autocomplete="username"
                />
                <div class="form-control-icon">
                  <i class="fas fa-user"></i>
                </div>
                <div class="field-error" id="errorUsername">
                  <i class="fas fa-circle-exclamation"></i>
                  <span id="errorUsernameMsg"></span>
                </div>
              </div>

              <!-- Input Password -->
              <div class="form-group position-relative has-icon-left mb-4" id="wrapPassword">
                <input
                  type="password"
                  id="inputPassword"
                  class="form-control form-control-xl"
                  placeholder="Password"
                  autocomplete="current-password"
                />
                <div class="form-control-icon">
                  <i class="fas fa-lock"></i>
                </div>
                <button
                  type="button"
                  class="password-toggle"
                  id="togglePassword"
                  aria-label="Tampilkan password"
                >
                  <i class="fas fa-eye" id="togglePasswordIcon"></i>
                </button>
                <div class="field-error" id="errorPassword">
                  <i class="fas fa-circle-exclamation"></i>
                  <span id="errorPasswordMsg"></span>
                </div>
              </div>

              <!-- Tombol Login -->
              <button type="submit" class="btn btn-primary btn-lg mt-3 w-100">
                Log in
              </button>

            </form>
          </div>
        </div>

        <!-- Kolom Kanan: Splash Image -->
        <div class="col-lg-7 d-none d-lg-block">
          <div id="auth-right"></div>
        </div>

      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AdminLTE 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-rc2/dist/js/adminlte.min.js"></script>

    <script>
      // ── Kredensial valid (sesuaikan atau ganti dengan request ke backend) ───
      const VALID_USERNAME = 'admin';
      const VALID_PASSWORD = 'password123';
      // ────────────────────────────────────────────────────────────────────────

      const form          = document.getElementById('loginForm');
      const inputUser     = document.getElementById('inputUsername');
      const inputPass     = document.getElementById('inputPassword');
      const wrapUser      = document.getElementById('wrapUsername');
      const wrapPass      = document.getElementById('wrapPassword');
      const errUserEl     = document.getElementById('errorUsername');
      const errPassEl     = document.getElementById('errorPassword');
      const errUserMsg    = document.getElementById('errorUsernameMsg');
      const errPassMsg    = document.getElementById('errorPasswordMsg');
      const toggleBtn     = document.getElementById('togglePassword');
      const toggleIcon    = document.getElementById('togglePasswordIcon');

      // ── Show / hide password ─────────────────────────────────────────────────
      toggleBtn.addEventListener('click', function () {
        const isHidden = inputPass.type === 'password';
        inputPass.type = isHidden ? 'text' : 'password';
        toggleIcon.classList.toggle('fa-eye',       !isHidden);
        toggleIcon.classList.toggle('fa-eye-slash',  isHidden);
        this.setAttribute('aria-label', isHidden ? 'Sembunyikan password' : 'Tampilkan password');
      });

      // ── Helper: tampilkan error ──────────────────────────────────────────────
      function showError(input, wrap, errEl, msgEl, message) {
        input.classList.add('is-invalid');
        wrap.classList.add('has-error');
        msgEl.textContent = message;
        errEl.classList.add('show');
      }

      // ── Helper: hapus error ──────────────────────────────────────────────────
      function clearError(input, wrap, errEl) {
        input.classList.remove('is-invalid');
        wrap.classList.remove('has-error');
        errEl.classList.remove('show');
      }

      // ── Hapus error saat user mulai mengetik ulang ───────────────────────────
      inputUser.addEventListener('input', () => clearError(inputUser, wrapUser, errUserEl));
      inputPass.addEventListener('input', () => clearError(inputPass, wrapPass, errPassEl));

      // ── Validasi saat form di-submit ─────────────────────────────────────────
      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const username = inputUser.value.trim();
        const password = inputPass.value;

        // Reset semua error
        clearError(inputUser, wrapUser, errUserEl);
        clearError(inputPass, wrapPass, errPassEl);

        let hasError = false;

        if (username === '') {
          showError(inputUser, wrapUser, errUserEl, errUserMsg, 'Username tidak boleh kosong.');
          hasError = true;
        }

        if (password === '') {
          showError(inputPass, wrapPass, errPassEl, errPassMsg, 'Password tidak boleh kosong.');
          hasError = true;
        }

        if (hasError) return;

        // Cek kredensial
        const userValid = username === VALID_USERNAME;
        const passValid = password === VALID_PASSWORD;

        if (!userValid || !passValid) {
          if (!userValid) {
            showError(inputUser, wrapUser, errUserEl, errUserMsg, 'Username tidak ditemukan.');
          }
          if (!passValid) {
            showError(inputPass, wrapPass, errPassEl, errPassMsg, 'Password yang Anda masukkan salah.');
          }
          return;
        }

        // Sukses — arahkan ke dashboard
        window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
